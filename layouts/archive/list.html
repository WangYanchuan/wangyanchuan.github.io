{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<section class="page">
  <div class="container">
    <div class="page-header">
      <h1>{{ .Title }}</h1>
    </div>
    {{ range .Site.RegularPages.GroupByDate "2006" }}
    <h2 style="font-size:1.1rem;font-weight:600;margin:1.5rem 0 0.75rem 0;color:var(--fg-muted)">{{ .Key }}</h2>
    <div class="list-page">
      <ul>
      {{ range .Pages }}
        <li>
          <time>{{ .Date.Format "01-02" }}</time>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
      </ul>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
