{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}
{{ define "main" }}
<section class="page">
  <div class="container">
    <div class="page-header">
      <h1>{{ .Title }}</h1>
    </div>
    <ul class="tag-cloud">
    {{ range .Data.Terms.Alphabetical }}
      <li>
        <a href="{{ .Page.RelPermalink }}">{{ .Page.Title }} <span class="count">({{ .Count }})</span></a>
      </li>
    {{ end }}
    </ul>
  </div>
</section>
{{ end }}
